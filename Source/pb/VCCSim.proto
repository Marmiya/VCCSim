syntax = "proto3";

package VCCSim;

// Attention: The coordinates are left-handed, x is forward, y is right, z is up

// Public:
message EmptyRequest {
}

message Vec3f {
  float x = 1;
  float y = 2;
  float z = 3;
}

message Rotation {
  float x = 1;
  float y = 2;
  float z = 3;
  float w = 4;
}

message Pose {
  Vec3f position = 1;
  Rotation rotation = 2;
}

message PoseYawOnly {
  Vec3f position = 1;
  float yaw = 2;
}

// ===== POINT CLOUD TYPES =====
message PointWithColor {
  Vec3f point = 1;
  uint32 color = 2;
}

message PointCloudWithColor {
  repeated PointWithColor data = 1;
}

message Twist {
  Vec3f linear = 1;   // Linear velocity (x, y, z)
  Vec3f angular = 2;  // Angular velocity (x, y, z)
}

message Odometry {
  Pose pose = 1;
  Twist twist = 2;
}

// ===== COMMON TYPES =====
message Status {
  bool status = 1;
}

message RobotName {
  string name = 1;
}

message IndexedCamera {
  RobotName robot_name = 1;
  uint32 index = 2;
}

// ===== SENSOR DATA MESSAGES =====

message LidarData {
  repeated Vec3f data = 1;
}

message LidarDataAndOdom {
  LidarData data = 1;
  Odometry odom = 2;
}

message RGBImageData {
  uint32 width = 1;
  uint32 height = 2;
  bytes data = 3;
  uint32 timestamp = 5;
}

message DepthImageData {
  uint32 width = 1;
  uint32 height = 2;
  repeated float data = 3;
  uint32 timestamp = 4;
}

message DepthPointCloudData {
  repeated Vec3f data = 1;
  uint32 timestamp = 2;
}

// ===== ROBOT CONTROL MESSAGES =====

// Drone (6DOF - full pose with quaternion rotation)
message DronePose {
  string name = 1;
  Pose pose = 2;
}

message DronePath {
  string name = 1;
  repeated Pose path = 2;
}

// Car (simplified - position + yaw only)
message CarPose {
  string name = 1;
  PoseYawOnly pose = 2;
}

message CarPath {
  string name = 1;
  repeated PoseYawOnly path = 2;
}

// Services:
service RecordingService {
  rpc Recording (EmptyRequest) returns (Status);
}

service LidarService {
  rpc GetLiDARData (RobotName) returns (LidarData);
  rpc GetLiDAROdom (RobotName) returns (Odometry);
  rpc GetLiDARDataAndOdom (RobotName) returns (LidarDataAndOdom);
}

service RGBCameraService {
  rpc GetRGBData (IndexedCamera) returns (RGBImageData);
  rpc GetCameraOdom (RobotName) returns (Odometry);
}

service DepthCameraService {
  rpc GetDepthCameraOdom (RobotName) returns (Odometry);
  rpc GetDepthCameraImageData (IndexedCamera) returns (DepthImageData);
  rpc GetDepthPointCloud (IndexedCamera) returns (DepthPointCloudData);
}

service SegmentationCameraService {
  rpc GetSegmentationCameraOdom (RobotName) returns (Odometry);
  rpc GetSegmentationCameraImageData (IndexedCamera) returns (RGBImageData);
}

service NormalCameraService {
  rpc GetNormalCameraOdom (RobotName) returns (Odometry);
  rpc GetNormalCameraImageData (IndexedCamera) returns (RGBImageData); //todo: change type
}

service DroneService {
  rpc GetDronePose (RobotName) returns (Pose);
  rpc SendDronePose (DronePose) returns (Status);
  rpc SendDronePath (DronePath) returns (Status);
  rpc MoveToNext (RobotName) returns (Status);
}

service CarService {
  rpc GetCarOdom (RobotName) returns (Odometry);
  rpc SendCarPose (CarPose) returns (Status);
  rpc SendCarPath (CarPath) returns (Status);
  rpc MoveToNext (RobotName) returns (Status); // todo: implement
}

message MeshData {
  bytes data = 1;           // Binary mesh data
  uint32 format = 2;        // Format identifier
  uint32 version = 3;       // Format version
  bool simplified = 4;      // Whether mesh is simplified
  Pose transform = 5;       // Mesh world transform
}

message MeshID {
  uint32 id = 1;
}

service MeshService {
  rpc SendMesh (MeshData) returns (Status);
  rpc SendGlobalMesh (MeshData) returns (MeshID);
  rpc RemoveGlobalMesh (MeshID) returns (Status);
}

service PointCloudService {
  rpc SendPointCloudWithColor (PointCloudWithColor) returns (Status);
}

service SafeCheckService {
  rpc CheckSafetyPawn (RobotName) returns (Status); // todo: implement
  rpc CheckSafetyPosition (Vec3f) returns (Status); // todo: implement
  rpc CheckSafetyDronePath (DronePath) returns (Status); // todo: implement
}